<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар — Сантехніка</title>
    <style>
        :root{--bg:#0d0e12;--card:#161820;--text:#fff;--muted:#8b8e99;--accent:#ff5c00;--border:#242736}
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        body{background:var(--bg);color:var(--text);padding:20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
        nav{display:flex;gap:20px;margin-top:20px;background:var(--card);padding:15px 30px;border-radius:30px;border:1px solid var(--border);flex-wrap:wrap}
        nav a{text-decoration:none;font-weight:600}
        .product{max-width:900px;width:100%;background:var(--card);padding:24px;border-radius:16px;border:1px solid var(--border);margin-top:40px}
        .grid{display:grid;grid-template-columns:1fr 320px;gap:24px}
        @media(max-width:650px){.grid{grid-template-columns:1fr}}
        .product-img{width:100%;border-radius:12px;object-fit:cover;max-height:400px;display:block}
        .img-placeholder{width:100%;height:300px;border-radius:12px;background:linear-gradient(135deg,#ff5c00,#ff8c42);display:flex;align-items:center;justify-content:center;font-size:5rem}
        h1{margin-bottom:10px;font-size:1.6rem}
        .price{color:var(--accent);font-weight:700;font-size:1.8rem;margin-top:10px}
        .desc{color:var(--muted);margin-top:12px;line-height:1.6;font-size:1rem}
        .buy-btn{display:inline-block;margin-top:22px;padding:14px 24px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:1rem;transition:background .2s}
        .buy-btn:hover{background:#e05200}
        .back{display:block;margin-top:14px;color:var(--muted);text-decoration:none;font-size:0.95rem}
        .back:hover{color:#fff}
        .loading{color:var(--muted);text-align:center;padding:60px;font-size:1.1rem}
        .error-msg{color:#e74c3c;text-align:center;padding:40px}
    </style>
</head>
<body>
<nav>
    <a href="index.html" style="color:#fff">Каталог</a>
    <a href="about.html" style="color:#fff">Про нас</a>
    <a href="contacts.html" style="color:#fff">Контакти</a>
    <a href="admin.html" style="color:#fff">⚙️ Адмін</a>
</nav>

<div id="content" class="product">
    <p class="loading">Завантаження...</p>
</div>

<script>
(async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
        document.getElementById('content').innerHTML = '<p class="error-msg">Товар не знайдено. <a href="index.html" style="color:var(--accent)">← Повернутися до каталогу</a></p>';
        return;
    }
    try {
        const res = await fetch('/api/announcements');
        const items = await res.json();
        const item = items.find(i => i.id === id);
        if (!item) {
            document.getElementById('content').innerHTML = '<p class="error-msg">Товар не знайдено. <a href="index.html" style="color:var(--accent)">← Повернутися до каталогу</a></p>';
            return;
        }
        document.title = item.title + ' — Сантехніка';
        document.getElementById('content').innerHTML = `
            <div class="grid">
                <div>
                    ${item.imageUrl
                        ? `<img class="product-img" src="${item.imageUrl}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                        : ''}
                    <div class="img-placeholder" style="${item.imageUrl ? 'display:none' : ''}">📢</div>
                </div>
                <div>
                    <h1>${item.title}</h1>
                    ${item.price ? `<div class="price">${item.price}</div>` : '<div class="price">Договірна</div>'}
                    <p class="desc">${item.description}</p>
                    <a class="buy-btn" href="order.html?title=${encodeURIComponent(item.title)}">Замовити</a>
                    <a class="back" href="index.html">← Повернутися до каталогу</a>
                </div>
            </div>
        `;
    } catch(e) {
        document.getElementById('content').innerHTML = '<p class="error-msg">Помилка завантаження. <a href="index.html" style="color:var(--accent)">← Повернутися до каталогу</a></p>';
    }
})();
</script>
</body>
</html>
