<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оголошення — Сантехніка</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --text-color: #ffffff;
            --text-muted: #8b8e99;
            --accent-color: #ff5c00;
            --border-color: #242736;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; min-height: 100vh; }
        
        nav { display: flex; gap: 20px; margin-bottom: 40px; background: var(--card-bg); padding: 15px 30px; border-radius: 30px; border: 1px solid var(--border-color); width: fit-content; }
        nav a { text-decoration: none; color: var(--text-color); font-weight: 600; }
        nav a:hover { color: var(--accent-color); }

        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; text-align: center; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; }

        .announcements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .announcement-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
        .announcement-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 92, 0, 0.2); }

        .announcement-image { width: 100%; height: 200px; background: linear-gradient(135deg, #ff5c00, #ff8c42); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .announcement-image img { width: 100%; height: 100%; object-fit: cover; }

        .announcement-content { padding: 20px; }
        .announcement-content h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--accent-color); }
        .announcement-content p { color: var(--text-muted); line-height: 1.6; margin: 0; }

        .empty-message { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-message p { font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Каталог</a>
        <a href="about.html">Про нас</a>
        <a href="contacts.html">Контакти</a>
        <a href="announcements.html" style="color: var(--accent-color);">Оголошення</a>
            <a href="admin.html" style="color: #fff;">⚙️ Адмін</a>
    </nav>

    <div class="container">
        <h1>Актуальні оголошення</h1>
        <p class="subtitle">Дізнайтеся про спеціальні пропозиції та новини</p>

        <div id="announcements-container" class="announcements-grid">
            <p style="text-align: center; color: var(--text-muted); width: 100%;">Завантаження...</p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadAnnouncements() {
            try {
                const res = await fetch(`${API_BASE}/api/announcements`);
                const announcements = await res.json();
                const container = document.getElementById('announcements-container');
                
                if (!announcements.length) {
                    container.innerHTML = `
                        <div class="empty-message">
                            <p>На жаль, вільні оголошення поки немає</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = announcements.map(a => `
                    <div class="announcement-card">
                        <div class="announcement-image">
                            ${a.imageUrl ? `<img src="${a.imageUrl}" alt="${a.title}">` : `<div style="font-size: 3rem;">📢</div>`}
                        </div>
                        <div class="announcement-content">
                            <h2>${a.title}</h2>
                            <p>${a.description}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load announcements:', e);
                document.getElementById('announcements-container').innerHTML = '<p style="color: red;">Помилка при завантаженні об\'явлень</p>';
            }
        }

        loadAnnouncements();
        // Refresh announcements every 30 seconds
        setInterval(loadAnnouncements, 30000);
    </script>
</body>
</html>
