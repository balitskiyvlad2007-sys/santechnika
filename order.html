<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення — Сантехніка</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --text-color: #ffffff;
            --text-muted: #8b8e99;
            --accent-color: #ff5c00;
            --border-color: #242736;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        nav { display: flex; gap: 20px; margin-top: 20px; background: var(--card-bg); padding: 15px 30px; border-radius: 30px; border: 1px solid var(--border-color); max-width: fit-content; }
        nav a { text-decoration: none; font-weight: 600; }

        .form-container { background-color: var(--card-bg); border-radius: 24px; padding: 40px; max-width: 550px; width: 100%; border: 1px solid var(--border-color); margin-top: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 2rem; margin-bottom: 10px; text-align: center; color: white; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 15px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; color: white; font-size: 1rem; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-color); }
        .form-group select option { background: var(--card-bg); }
        
        .submit-btn { width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .submit-btn:hover { background-color: #e05200; }
        .submit-btn:disabled { background-color: #555; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
        .back-link:hover { color: white; }

        .msg { padding: 14px 18px; border-radius: 10px; margin-bottom: 20px; font-weight: 500; text-align: center; display: none; }
        .msg.success { background: rgba(39,174,96,.12); border: 1px solid #27ae60; color: #27ae60; display: block; }
        .msg.error   { background: rgba(231,76,60,.12);  border: 1px solid #e74c3c; color: #e74c3c;  display: block; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" style="color: #fff;">Каталог</a>
        <a href="about.html" style="color: #fff;">Про нас</a>
        <a href="contacts.html" style="color: #fff;">Контакти</a>
    </nav>

    <div class="form-container">
        <h1 id="form-title">Оформлення замовлення</h1>
        <p class="subtitle">Заповніть форму — ми зв'яжемося з вами найближчим часом</p>

        <div id="msg" class="msg"></div>

        <div class="form-group">
            <label>Ваше ім'я та прізвище *</label>
            <input type="text" id="name" placeholder="Іван Іванов" required>
        </div>
        
        <div class="form-group">
            <label>Номер телефону *</label>
            <input type="tel" id="phone" placeholder="+380" required>
        </div>

        <div class="form-group">
            <label>Спосіб доставки</label>
            <select id="delivery-select">
                <option value="Nova Poshta">Нова Пошта (відділення)</option>
                <option value="Ukrposhta">Укрпошта (відділення)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Населений пункт *</label>
            <input type="text" id="city-input" list="city-list" placeholder="напр. Київ" required>
            <datalist id="city-list"></datalist>
        </div>

        <div class="form-group" id="branch-group">
            <label>Відділення</label>
            <select id="branch-select">
                <option value="">Оберіть населений пункт</option>
            </select>
        </div>

        <div class="form-group">
            <label>Який товар замовляєте? / Коментар</label>
            <textarea id="comment" placeholder="напр. Змішувач для кухні класичний" rows="3"></textarea>
        </div>
        
        <button class="submit-btn" id="submit-btn" onclick="submitOrder()">Підтвердити замовлення</button>

        <a href="index.html" class="back-link">← Повернутися до каталогу</a>
    </div>

    <script>
    (function(){
        // Prefill from URL params
        try {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title');
            if (title) {
                document.getElementById('comment').value = title;
                document.getElementById('form-title').textContent = 'Замовлення — ' + title;
            }
        } catch(e) {}

        const mockData = {
            "Nova Poshta": {
                cities: ["Київ","Львів","Харків","Одеса"],
                branches: {
                    "Київ": ["Відділення №1","Відділення №15","Відділення №42"],
                    "Львів": ["Відділення №3","Відділення №7"],
                    "Харків": ["Відділення №5","Відділення №12"],
                    "Одеса": ["Відділення №2","Відділення №8"]
                }
            },
            "Ukrposhta": {
                cities: ["Київ","Львів","Одеса","Дніпро"],
                branches: {
                    "Київ": ["Укрпошта №10","Укрпошта №22"],
                    "Львів": ["Укрпошта №5"],
                    "Одеса": ["Укрпошта №3"],
                    "Дніпро": ["Укрпошта №11"]
                }
            }
        };

        const deliverySelect = document.getElementById('delivery-select');
        const cityInput = document.getElementById('city-input');
        const cityList = document.getElementById('city-list');
        const branchSelect = document.getElementById('branch-select');
        const cityRefMap = new Map();
        const API_BASE = window.location.origin;
        let cityTimer = null;

        async function populateCityList(provider, query) {
            cityList.innerHTML = '';
            cityRefMap.clear();
            if (!query || query.length < 2) return;
            const pid = provider === 'Nova Poshta' ? 'np' : 'ukr';
            try {
                const res = await fetch(`${API_BASE}/api/${pid}/search?q=${encodeURIComponent(query)}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (Array.isArray(data) && data.length) {
                    data.forEach(item => {
                        const label = item.Description || item.name || item;
                        const opt = document.createElement('option');
                        opt.value = label;
                        cityList.appendChild(opt);
                        if (provider === 'Nova Poshta' && (item.Ref || item.DeliveryCity)) {
                            cityRefMap.set(label, { Ref: item.Ref, DeliveryCity: item.DeliveryCity });
                        }
                    });
                    return;
                }
            } catch(e) {}
            (mockData[provider]?.cities || []).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                cityList.appendChild(opt);
            });
        }

        async function populateBranches(provider, city) {
            branchSelect.innerHTML = '';
            const pid = provider === 'Nova Poshta' ? 'np' : 'ukr';
            try {
                const cityData = cityRefMap.get(city);
                const refValue = cityData?.DeliveryCity || cityData?.Ref;
                const url = refValue
                    ? `${API_BASE}/api/${pid}/branches?cityRef=${encodeURIComponent(refValue)}`
                    : `${API_BASE}/api/${pid}/branches?cityName=${encodeURIComponent(city)}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (Array.isArray(data) && data.length) {
                    data.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b.Description || b;
                        opt.textContent = b.Description || b;
                        branchSelect.appendChild(opt);
                    });
                    return;
                }
            } catch(e) {}
            const branches = mockData[provider]?.branches?.[city] || [];
            if (!branches.length) {
                branchSelect.innerHTML = '<option value="">Відділення не знайдені</option>';
                return;
            }
            branches.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                branchSelect.appendChild(opt);
            });
        }

        cityInput.addEventListener('input', () => {
            clearTimeout(cityTimer);
            cityTimer = setTimeout(async () => {
                const q = cityInput.value.trim();
                await populateCityList(deliverySelect.value, q);
                if (q.length >= 2) populateBranches(deliverySelect.value, q);
                else branchSelect.innerHTML = '<option value="">Оберіть населений пункт</option>';
            }, 300);
        });

        deliverySelect.addEventListener('change', () => {
            cityInput.value = '';
            cityList.innerHTML = '';
            branchSelect.innerHTML = '<option value="">Оберіть населений пункт</option>';
            cityRefMap.clear();
        });
    })();

    async function submitOrder() {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const delivery = document.getElementById('delivery-select').value;
        const city = document.getElementById('city-input').value.trim();
        const branch = document.getElementById('branch-select').value;
        const comment = document.getElementById('comment').value.trim();
        const msg = document.getElementById('msg');
        const btn = document.getElementById('submit-btn');

        if (!name || !phone) {
            msg.textContent = "Будь ласка, заповніть ім'я та телефон";
            msg.className = 'msg error';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Відправляємо...';
        msg.className = 'msg';

        try {
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, delivery, city, branch, comment })
            });
            const data = await res.json();
            if (res.ok) {
                msg.textContent = '✅ Замовлення прийнято! Ми зв\'яжемося з вами найближчим часом.';
                msg.className = 'msg success';
                document.getElementById('name').value = '';
                document.getElementById('phone').value = '';
                document.getElementById('city-input').value = '';
                document.getElementById('comment').value = '';
            } else {
                msg.textContent = data.error || 'Помилка відправки';
                msg.className = 'msg error';
            }
        } catch(e) {
            msg.textContent = 'Помилка з\'єднання з сервером';
            msg.className = 'msg error';
        }

        btn.disabled = false;
        btn.textContent = 'Підтвердити замовлення';
    }
    <script>
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        // Ловим название товара, если оно передано через URL (как мы делали для объявлений)
        const productFromUrl = params.get('product');
        const commentField = document.getElementById('comment');

        if (productFromUrl && commentField) {
            commentField.value = `Замовлення на товар: ${productFromUrl}`;
            commentField.readOnly = true; // Чтобы юзер не стер название
        }
    });
</script>

</body>
</html>
